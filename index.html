  get(k){try{const v=localStorage.getItem('tc-'+k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem('tc-'+k,JSON.stringify(v))}catch{}},
};

function resizeImg(file,maxW=800){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const s=Math.min(1,maxW/img.width);c.width=img.width*s;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.6))};img.src=e.target.result};
    r.readAsDataURL(file);
  });
}

const tMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+(m||0)};
const getOv=acts=>{const s=new Set();for(let i=0;i<acts.length;i++)for(let j=i+1;j<acts.length;j++){const a=acts[i],b=acts[j];if(!a.end||!b.end)continue;if(tMin(a.time)<tMin(b.end)&&tMin(b.time)<tMin(a.end)){s.add(a.id);s.add(b.id)}}return s};

/* ── UI Atoms ── */
function Pill({children,bg,tx,style:s}){return <span style={{display:'inline-block',padding:'2px 7px',borderRadius:6,fontSize:11,fontWeight:700,background:bg||'#f3f3f3',color:tx||'#666',...(s||{})}}>{children}</span>}

function Modal({children,onClose}){return <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.45)',backdropFilter:'blur(6px)'}}><div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,padding:'22px 20px',width:'92%',maxWidth:440,maxHeight:'85vh',overflow:'auto',boxShadow:'0 25px 60px rgba(0,0,0,0.2)'}}>{children}</div></div>}

/* ── Vote Card ── */
function VoteCard({vote,onVote}){
  const total=(vote.votes||[]).reduce((a,b)=>a+b,0);
  return <div style={{background:'#fff',borderRadius:14,padding:'12px 14px',marginBottom:8,border:vote.my===-1?'2px solid #93C5FD':'1px solid #eee'}}>
    <p style={{fontSize:13,fontWeight:700,margin:'0 0 8px'}}>{vote.q}</p>
    {(vote.opts||[]).map((o,i)=>{const pct=total?Math.round(((vote.votes||[])[i]||0)/total*100):0;const sel=vote.my===i;
      return <div key={i} onClick={()=>onVote(vote.id,i)} style={{position:'relative',padding:'7px 10px',borderRadius:8,border:sel?'1.5px solid #3B82F6':'1px solid #eee',marginBottom:4,cursor:'pointer',overflow:'hidden',background:sel?'#EFF6FF':'#FAFAF8'}}>
        <div style={{position:'absolute',left:0,top:0,bottom:0,width:pct+'%',background:sel?'#DBEAFE':'#f0f0f0',transition:'width 0.4s',borderRadius:8}}/>
        <div style={{position:'relative',display:'flex',justifyContent:'space-between'}}><span style={{fontSize:12}}>{o}</span><span style={{fontSize:11,color:'#999',fontWeight:600}}>{pct}%</span></div>
      </div>})}
    <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}><Pill>🔒 익명</Pill><span style={{fontSize:11,color:'#bbb'}}>{total}명</span></div>
  </div>
}

/* ── Vote Composer (self-contained) ── */
function VoteComposer({onCreated}){
  const[open,setOpen]=useState(false);
  const[q,setQ]=useState('');const[o1,setO1]=useState('');const[o2,setO2]=useState('');const[o3,setO3]=useState('');
  if(!open) return <button onClick={()=>setOpen(true)} style={{width:'100%',padding:8,borderRadius:10,border:'2px dashed #ddd',background:'transparent',fontSize:11,fontWeight:600,color:'#bbb'}}>+ 새 투표</button>;
  const submit=()=>{if(!q||!o1||!o2)return;const opts=[o1,o2];if(o3)opts.push(o3);onCreated({id:Date.now(),q,opts,votes:Array(opts.length).fill(0),my:-1});setQ('');setO1('');setO2('');setO3('');setOpen(false)};
  return <div style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,border:'1.5px solid #93C5FD'}}>
    <p style={{fontSize:12,fontWeight:700,margin:'0 0 8px'}}>새 투표 만들기</p>
    {[[q,setQ,'질문'],[o1,setO1,'선택지 1'],[o2,setO2,'선택지 2'],[o3,setO3,'선택지 3 (선택)']].map(([v,s,p],i)=>
      <input key={i} value={v} onChange={e=>s(e.target.value)} placeholder={p} style={{width:'100%',padding:'7px 10px',borderRadius:6,border:'1px solid #e5e5e5',fontSize:12,marginBottom:4,boxSizing:'border-box'}}/>
    )}
    <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginTop:4}}>
      <button onClick={()=>{setOpen(false);setQ('');setO1('');setO2('');setO3('')}} style={{padding:'5px 11px',borderRadius:8,border:'1.5px solid #e5e5e5',background:'#fff',fontSize:11,fontWeight:700,color:'#888'}}>취소</button>
      <button onClick={submit} style={{padding:'5px 11px',borderRadius:8,border:'none',background:'#1a1a1a',color:'#fff',fontSize:11,fontWeight:700}}>올리기</button>
    </div>
  </div>
}

/* ── AI Summary ── */
const aiCache={};
function AISummary({name,onClose}){
  const[text,setText]=useState('');const[ld,setLd]=useState(true);const[md,setMd]=useState('summary');const[spk,setSpk]=useState(false);const busy=useRef(false);
  const gen=useCallback(async type=>{
    const key=name+'-'+type;if(aiCache[key]){setText(aiCache[key]);setLd(false);return}
    if(busy.current)return;busy.current=true;setLd(true);setText('');
    try{const pm={summary:'"'+name+'" 여행자용 30초 한국어 요약(60단어).',facts:'"'+name+'" 흥미 사실 3가지 한국어.'};
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:pm[type]}]})});
      const d=await r.json();const full=d.content?.[0]?.text||'요약 불가';aiCache[key]=full;
      for(let i=0;i<full.length;i++){await new Promise(r=>setTimeout(r,8));setText(full.slice(0,i+1))}
    }catch{setText('AI 연결 오류')}setLd(false);busy.current=false;
  },[name]);
  useEffect(()=>{gen('summary')},[gen]);
  const speak=()=>{if(!window.speechSynthesis)return;if(spk){window.speechSynthesis.cancel();setSpk(false);return}const u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=0.92;const v=window.speechSynthesis.getVoices().find(v=>v.lang==='ko-KR');if(v)u.voice=v;u.onend=()=>setSpk(false);u.onerror=()=>setSpk(false);setSpk(true);window.speechSynthesis.speak(u)};
  return <div style={{background:'#FAFAF8',border:'1px solid #E8E6E1',borderRadius:10,overflow:'hidden',marginTop:6}}>
    <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',borderBottom:'1px solid #f0eeea',background:'#F5F4F0'}}>
      <span style={{fontSize:10,fontWeight:700,color:'#8B8579'}}>AI 가이드</span>
      <span style={{fontSize:9,padding:'1px 5px',borderRadius:4,background:'#E8DFF5',color:'#6B21A8',fontWeight:600,marginLeft:'auto'}}>Claude</span>
      <button onClick={onClose} style={{background:'none',border:'none',fontSize:12,color:'#bbb',padding:0}}>✕</button>
    </div>
    <div style={{padding:'6px 10px'}}>
      <div style={{display:'flex',gap:4,marginBottom:6}}>{[['summary','30초 요약'],['facts','재밌는 사실']].map(([k,l])=><button key={k} onClick={()=>{setMd(k);gen(k)}} style={{padding:'3px 9px',borderRadius:14,border:'none',fontSize:10,fontWeight:600,background:md===k?'#1a1a1a':'#eee',color:md===k?'#fff':'#888'}}>{l}</button>)}</div>
      <p style={{fontSize:12,lineHeight:1.65,color:'#3a3a3a',minHeight:24,margin:0}}>{ld&&!text?<span style={{color:'#bbb',fontStyle:'italic'}}>생성 중...</span>:text}{ld&&<span style={{display:'inline-block',width:2,height:11,background:'#1a1a1a',marginLeft:1,verticalAlign:'middle',animation:'blink .7s steps(1) infinite'}}/>}</p>
      {!ld&&text&&<button onClick={speak} style={{display:'flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:14,border:'1px solid #e0ddd8',background:spk?'#DCFCE7':'#fff',fontSize:10,fontWeight:600,color:spk?'#166534':'#555',marginTop:4}}>{spk?'■ 정지':'▶ 듣기'}</button>}
    </div>
  </div>
}

  const setDayPhoto=(did,photo)=>setItin(p=>p.map(d=>d.id===did?{...d,photo}:d));
  const castVote=(vid,oi)=>{setVotes(p=>p.map(v=>{if(v.id!==vid)return v;const nv=[...(v.votes||[])];if(v.my===oi){nv[oi]=Math.max(0,(nv[oi]||0)-1);return{...v,votes:nv,my:-1}}if(typeof v.my==='number'&&v.my>=0&&v.my<nv.length)nv[v.my]=Math.max(0,(nv[v.my]||0)-1);nv[oi]=(nv[oi]||0)+1;return{...v,votes:nv,my:oi}}));show('투표 완료 🔒')};

        <div style={{width:38,height:38,borderRadius:10,background:r.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>{r.ic}</div>

          onReqAct={a=>setReqMod({dayTitle:day.date+' '+day.title,act:a})}
          onMove={moveAct} onDelete={deleteAct} onActPhoto={setActPhoto} onGoLive={goLive}
          onAddAct={()=>{const na={id:'n'+Date.now(),time:'12:00',end:'13:00',name:'새 일정',note:'',cat:'관광',transport:'',photo:''};setItin(p=>p.map(d=>d.id===day.id?{...d,activities:[...d.activities,na]}:d));setEditMod({dayId:day.id,act:na})}}
        />
      })}

      {/* Vote Tab */}
      {tab==='vote'&&<div>
        {votes.map(v=><VoteCard key={v.id} vote={v} onVote={castVote}/>)}
        <VoteComposer onCreated={v=>setVotes(p=>[v,...p])}/>
      </div>}

      {/* Crew Tab */}
      {tab==='crew'&&<div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:11,color:'#999'}}>일행 {crew.length}명</span>
          {isP&&<button onClick={()=>setCrewMod({mode:'add',data:{name:'',avatar:'',bg:AVCOLS[crew.length%6].bg,tx:AVCOLS[crew.length%6].tx,loc:'',status:'준비 중',role:'여행자'}})} style={{padding:'5px 11px',borderRadius:8,border:'none',background:'#1a1a1a',color:'#fff',fontSize:11,fontWeight:700}}>+ 추가</button>}
        </div>
        {crew.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'#fff',borderRadius:12,marginBottom:5}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:c.bg,color:c.tx,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{c.avatar||c.name[0]}</div>
          <div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:3}}><span style={{fontSize:12,fontWeight:700}}>{c.name}</span><Pill style={{fontSize:9}}>{c.role}</Pill></div><p style={{margin:'1px 0 0',fontSize:10,color:'#999'}}>{c.loc||'위치 없음'}</p></div>
          <Pill bg={['도착','나'].includes(c.status)?'#DCFCE7':'#f3f3f3'} tx={['도착','나'].includes(c.status)?'#166534':'#999'}>{c.status}</Pill>
          {isP&&<BtnI onClick={()=>setCrewMod({mode:'edit',data:c})}>✏️</BtnI>}
        </div>)}
        <div style={{background:'#fff',borderRadius:12,padding:'10px 12px',marginTop:8}}>
          <p style={{fontSize:10,fontWeight:700,color:'#999',margin:'0 0 4px'}}>📢 빠른 알림</p>
          {['지금 출발! 🚗','30분 더 ⏱','다음 이동 🏃','밥 먹으러 🍽️'].map(m=><button key={m} onClick={()=>show('전송: '+m)} style={{display:'block',width:'100%',textAlign:'left',padding:'5px 7px',borderRadius:6,border:'none',background:'transparent',fontSize:11,color:'#555'}}>{m}</button>)}
        </div>
      </div>}
    </div>

    {/* Modals */}
    {editMod&&<Modal onClose={()=>setEditMod(null)}>
      <EditForm act={editMod.act} onSave={u=>{saveAct(editMod.dayId,u);setEditMod(null)}} onPhoto={async file=>{const d=await resizeImg(file);setActPhoto(editMod.dayId,editMod.act.id,d);setEditMod(p=>({...p,act:{...p.act,photo:d}}))}} onClose={()=>setEditMod(null)}/>
    </Modal>}
    {reqMod&&<Modal onClose={()=>setReqMod(null)}>
      <ReqForm dayTitle={reqMod.dayTitle} act={reqMod.act} onSubmit={r=>{setReqs(p=>[...p,r]);setReqMod(null);show('수정 요청 보냄 💬')}} onClose={()=>setReqMod(null)}/>
    </Modal>}
    {crewMod&&<Modal onClose={()=>setCrewMod(null)}>
      <CrewForm init={crewMod.data} isEdit={crewMod.mode==='edit'} onSave={d=>{if(crewMod.mode==='edit')setCrew(p=>p.map(c=>c.id===d.id?d:c));else setCrew(p=>[...p,{...d,id:Date.now()}]);setCrewMod(null);show('저장됨 ✓')}} onDelete={()=>{setCrew(p=>p.filter(c=>c.id!==crewMod.data.id));setCrewMod(null);show('삭제됨')}} onClose={()=>setCrewMod(null)}/>
    </Modal>}
  </div>
}

/* ── Forms ── */
function EditForm({act,onSave,onPhoto,onClose}){
  const[f,setF]=useState({...act});const fRef=useRef(null);
  return <div>
    <h3 style={{fontSize:15,fontWeight:800,margin:'0 0 12px'}}>일정 수정</h3>
    {f.photo&&<div style={{position:'relative',marginBottom:8}}><img src={f.photo} style={{width:'100%',height:100,objectFit:'cover',borderRadius:10}}/><button onClick={()=>setF(p=>({...p,photo:''}))} style={{position:'absolute',top:4,right:4,width:20,height:20,borderRadius:'50%',background:'rgba(0,0,0,0.5)',color:'#fff',border:'none',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>}
    <button onClick={()=>fRef.current?.click()} style={{width:'100%',padding:8,borderRadius:8,border:'1.5px dashed #ddd',background:'#FAFAF8',fontSize:11,color:'#999',marginBottom:8}}>📷 {f.photo?'사진 변경':'사진 추가'}<input ref={fRef} type="file" accept="image/*" onChange={e=>{const file=e.target.files?.[0];if(file)onPhoto?.(file)}} style={{display:'none'}}/></button>
    {[{l:'활동명',k:'name',t:'text'},{l:'시작',k:'time',t:'time'},{l:'종료',k:'end',t:'time'},{l:'메모',k:'note',t:'text'},{l:'이동수단',k:'transport',t:'text'}].map(x=><div key={x.k} style={{marginBottom:8}}><label style={{fontSize:10,fontWeight:700,color:'#999',display:'block',marginBottom:2}}>{x.l}</label><input type={x.t} value={f[x.k]||''} onChange={e=>setF(p=>({...p,[x.k]:e.target.value}))} style={{width:'100%',padding:'7px 9px',borderRadius:8,border:'1.5px solid #e5e5e5',fontSize:12,boxSizing:'border-box'}}/></div>)}
    <div style={{marginBottom:8}}><label style={{fontSize:10,fontWeight:700,color:'#999',display:'block',marginBottom:2}}>카테고리</label><select value={f.cat} onChange={e=>setF(p=>({...p,cat:e.target.value}))} style={{width:'100%',padding:'7px 9px',borderRadius:8,border:'1.5px solid #e5e5e5',fontSize:12,boxSizing:'border-box'}}>{Object.keys(CATS).map(c=><option key={c}>{c}</option>)}</select></div>
    <div style={{display:'flex',gap:8,marginTop:14}}>
      <button onClick={onClose} style={{flex:1,padding:9,borderRadius:12,border:'1.5px solid #e5e5e5',background:'#fff',fontSize:13,fontWeight:700,color:'#888'}}>취소</button>
      <button onClick={()=>onSave(f)} style={{flex:1,padding:9,borderRadius:12,border:'none',background:'#1a1a1a',color:'#fff',fontSize:13,fontWeight:700}}>저장</button>
    </div>
  </div>
}

function ReqForm({dayTitle,act,onSubmit,onClose}){
  const[type,setType]=useState('시간변경');const[msg,setMsg]=useState('');
  return <div>
    <h3 style={{fontSize:15,fontWeight:800,margin:'0 0 2px'}}>수정 요청</h3>
    <p style={{fontSize:11,color:'#999',margin:'0 0 10px'}}>{dayTitle} · {act.name}</p>
    <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap'}}>{['시간변경','장소변경','삭제요청','기타'].map(t=><button key={t} onClick={()=>setType(t)} style={{padding:'3px 10px',borderRadius:14,border:'none',fontSize:10,fontWeight:700,background:t===type?'#1a1a1a':'#f0f0f0',color:t===type?'#fff':'#888'}}>{t}</button>)}</div>
    <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="수정 내용..." style={{width:'100%',height:70,borderRadius:10,border:'1.5px solid #e5e5e5',padding:8,fontSize:12,resize:'none',boxSizing:'border-box'}}/>
    <div style={{display:'flex',gap:8,marginTop:10}}>
      <button onClick={onClose} style={{flex:1,padding:9,borderRadius:12,border:'1.5px solid #e5e5e5',background:'#fff',fontSize:13,fontWeight:700,color:'#888'}}>취소</button>
      <button onClick={()=>onSubmit({type,msg,dayTitle,actName:act.name})} style={{flex:1,padding:9,borderRadius:12,border:'none',background:'#1a1a1a',color:'#fff',fontSize:13,fontWeight:700}}>보내기</button>
    </div>
  </div>
}

function CrewForm({init,isEdit,onSave,onDelete,onClose}){
  const[f,setF]=useState({...init});
  return <div>
    <h3 style={{fontSize:15,fontWeight:800,margin:'0 0 12px'}}>{isEdit?'일행 수정':'일행 추가'}</h3>
    {[{l:'이름',k:'name'},{l:'아바타 글자',k:'avatar'},{l:'현재 위치',k:'loc'}].map(x=><div key={x.k} style={{marginBottom:8}}><label style={{fontSize:10,fontWeight:700,color:'#999',display:'block',marginBottom:2}}>{x.l}</label><input value={f[x.k]||''} onChange={e=>setF(p=>({...p,[x.k]:e.target.value}))} style={{width:'100%',padding:'7px 9px',borderRadius:8,border:'1.5px solid #e5e5e5',fontSize:12,boxSizing:'border-box'}}/></div>)}
    <div style={{marginBottom:8}}><label style={{fontSize:10,fontWeight:700,color:'#999',display:'block',marginBottom:2}}>상태</label><select value={f.status} onChange={e=>setF(p=>({...p,status:e.target.value}))} style={{width:'100%',padding:'7px 9px',borderRadius:8,border:'1.5px solid #e5e5e5',fontSize:12,boxSizing:'border-box'}}>{STS.map(s=><option key={s}>{s}</option>)}</select></div>
    <div style={{marginBottom:8}}><label style={{fontSize:10,fontWeight:700,color:'#999',display:'block',marginBottom:2}}>역할</label><select value={f.role} onChange={e=>setF(p=>({...p,role:e.target.value}))} style={{width:'100%',padding:'7px 9px',borderRadius:8,border:'1.5px solid #e5e5e5',fontSize:12,boxSizing:'border-box'}}>{['플래너','여행자','부모님'].map(s=><option key={s}>{s}</option>)}</select></div>
    <div style={{marginBottom:8}}><label style={{fontSize:10,fontWeight:700,color:'#999',display:'block',marginBottom:3}}>색상</label><div style={{display:'flex',gap:5}}>{AVCOLS.map((ac,i)=><div key={i} onClick={()=>setF(p=>({...p,bg:ac.bg,tx:ac.tx}))} style={{width:26,height:26,borderRadius:'50%',background:ac.bg,cursor:'pointer',border:f.bg===ac.bg?'2px solid #1a1a1a':'2px solid transparent'}}/>)}</div></div>
    <div style={{display:'flex',gap:6,marginTop:14}}>
      {isEdit&&<button onClick={onDelete} style={{padding:9,borderRadius:12,border:'1.5px solid #FECACA',background:'#fff',fontSize:13,fontWeight:700,color:'#DC2626'}}>삭제</button>}
      <button onClick={onClose} style={{flex:1,padding:9,borderRadius:12,border:'1.5px solid #e5e5e5',background:'#fff',fontSize:13,fontWeight:700,color:'#888'}}>취소</button>
      <button onClick={()=>onSave(f)} style={{flex:1,padding:9,borderRadius:12,border:'none',background:'#1a1a1a',color:'#fff',fontSize:13,fontWeight:700}}>저장</button>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
